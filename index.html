<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>BLEAK SWORD — demo</title>
<style>
  :root { --bg:#0a0908; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#000; overflow:hidden;
    font-family:"Courier New",ui-monospace,monospace; color:#cabfa8; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:#000; touch-action:none; user-select:none; -webkit-user-select:none; }
  canvas { image-rendering:pixelated; image-rendering:crisp-edges;
    box-shadow:0 0 60px rgba(0,0,0,.9); }
  #hint { position:fixed; bottom:6px; left:0; right:0; text-align:center;
    font-size:11px; letter-spacing:2px; color:#5a5346; pointer-events:none;
    text-transform:uppercase; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hint">drag / arrows = dodge · click enemy / J = slash · click during red flash = parry</div>
<script>
(() => {
"use strict";

// ---------- internal resolution (portrait, mobile-ish like the original) ----------
const W = 360, H = 640;
const cv = document.getElementById("c");
const ctx = cv.getContext("2d", { alpha:false });
cv.width = W; cv.height = H;

function fit() {
  const pad = 0.96;
  const s = Math.min(window.innerWidth / W, window.innerHeight / H) * pad;
  cv.style.width  = Math.floor(W * s) + "px";
  cv.style.height = Math.floor(H * s) + "px";
}
window.addEventListener("resize", fit); fit();

// ---------- noise / grain ----------
const NW = 180, NH = 320;
const noiseCv = document.createElement("canvas");
noiseCv.width = NW; noiseCv.height = NH;
const nctx = noiseCv.getContext("2d");
const noiseImg = nctx.createImageData(NW, NH);
let seed = 1337;
function rnd(){ seed = (seed*1664525 + 1013904223) & 0x7fffffff; return seed / 0x7fffffff; }
function regenNoise(){
  const d = noiseImg.data;
  for (let i=0;i<d.length;i+=4){
    const v = (rnd()*255)|0;
    d[i]=v; d[i+1]=v; d[i+2]=v; d[i+3]=255;
  }
  nctx.putImageData(noiseImg,0,0);
}

// ---------- helpers ----------
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const now=()=>perfNow; let perfNow=0;
function rint(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }

// ---------- game state ----------
const STATE = { TITLE:0, PLAY:1, DEAD:2, WIN:3 };
let gstate = STATE.TITLE;

const player = {
  x:W/2, baseY:H-96, hp:4, maxHp:4, stamina:100, maxStam:100,
  state:"idle", t:0, dur:0, dodgeDir:0, lean:0, target:null,
  flashHurt:0, dead:false, parryGlow:0
};

let enemies = [];
let wave = 0;
let waveTimer = 0;     // breather between waves
let kills = 0;
let shake = 0;
let hitFlash = 0;
let redFlash = 0;
let slashFx = [];      // sword arcs
let bloodFx = [];      // particles
let combo = 0, comboTimer = 0;
let bestWave = 0;
const MAX_WAVE = 8;

function resetPlayer(){
  player.hp=player.maxHp; player.stamina=player.maxStam;
  player.state="idle"; player.t=0; player.x=W/2; player.lean=0;
  player.dead=false; player.flashHurt=0; player.target=null; player.parryGlow=0;
}

function startGame(){
  resetPlayer();
  enemies=[]; wave=0; kills=0; combo=0; slashFx=[]; bloodFx=[];
  gstate=STATE.PLAY;
  nextWave();
}

function nextWave(){
  wave++;
  if (wave > MAX_WAVE){ gstate=STATE.WIN; return; }
  bestWave = Math.max(bestWave, wave);
  const count = Math.min(1 + Math.floor(wave/1.5), 4);
  const hp = 2 + Math.floor(wave/3);
  enemies = [];
  for (let i=0;i<count;i++){
    const slot = count===1 ? W/2 : lerp(78, W-78, i/(count-1));
    enemies.push(makeEnemy(slot, hp, i));
  }
  player.hp = Math.min(player.maxHp, player.hp + (wave>1?1:0)); // small heal each wave
}

function makeEnemy(x, hp, idx){
  return {
    x, baseY:-60, engageY: 250 + (idx%2)*26 + rint(-8,8),
    hp, maxHp:hp, state:"approach", t:0, dur:0,
    lean:0, flash:0, stagger:0, idx, alive:true, deadT:0,
    speed: 26 + Math.random()*10, attackToken:false
  };
}

// only a limited number of enemies may press an attack at once
function activeAttackers(){
  let n=0; for (const e of enemies) if (e.alive && (e.state==="windup"||e.state==="strike")) n++;
  return n;
}
function maxAttackers(){ return wave>=5?2:1; }

// ---------- player actions ----------
function tryDodge(dir){ // dir: -1 left, 1 right, 0 back
  if (player.state==="dodge"||player.state==="attack"||player.dead) return;
  if (player.stamina < 22){ shake=Math.max(shake,3); return; }
  player.stamina -= 22;
  player.state="dodge"; player.t=0; player.dur=0.42; player.dodgeDir=dir;
}

function enemyAt(px,py){
  let best=null, bd=1e9;
  for (const e of enemies){
    if (!e.alive) continue;
    const ey = enemyY(e);
    const d = Math.hypot(px-e.x, py-ey);
    if (d<46 && d<bd){ bd=d; best=e; }
  }
  return best;
}

function tryAttack(targetEnemy){
  if (player.state==="dodge"||player.state==="attack"||player.dead) return;
  let e = targetEnemy;
  if (!e){ // pick nearest open/alive enemy
    let bd=1e9;
    for (const en of enemies){ if(!en.alive) continue;
      const d=Math.abs(en.x-player.x)+ (en.state==="recover"||en.state==="stagger"?-200:0);
      if (d<bd){bd=d; e=en;}
    }
  }
  if (!e){ return; }
  if (player.stamina < 18){ shake=Math.max(shake,3); return; }
  player.stamina -= 18;
  player.state="attack"; player.t=0; player.dur=0.26; player.target=e;
  player._hitDone=false;
}

function resolveHit(e){
  if (!e || !e.alive) return;
  // PARRY: striking an enemy in the late windup
  if (e.state==="windup" && e.t > e.dur*0.45){
    e.state="stagger"; e.stagger=1.1; e.t=0; e.flash=1;
    player.stamina = Math.min(player.maxStam, player.stamina+30);
    player.parryGlow=1; redFlash=0; hitFlash=Math.max(hitFlash,.5);
    shake=Math.max(shake,7);
    spawnSlash(e.x, enemyY(e), 1.4);
    spawnBlood(e.x, enemyY(e), 6, "#d8d2c2");
    combo++; comboTimer=2.2;
    return;
  }
  // normal hit
  let dmg = (e.state==="recover"||e.state==="stagger") ? 2 : 1;
  e.hp -= dmg; e.flash=1; e.stagger=Math.max(e.stagger,0.35);
  if (e.state!=="strike"){ e.state="stagger"; e.t=0; }
  shake=Math.max(shake,5);
  spawnSlash(e.x, enemyY(e), 1);
  spawnBlood(e.x, enemyY(e), dmg*5, "#7a0d0d");
  combo++; comboTimer=2.2;
  if (e.hp<=0){
    e.alive=false; e.state="dead"; e.deadT=0;
    kills++;
    spawnBlood(e.x, enemyY(e), 14, "#6e0c0c");
    shake=Math.max(shake,8);
  }
}

function spawnSlash(x,y,power){
  slashFx.push({x,y,t:0,dur:0.22, ang: Math.random()*Math.PI, power});
}
function spawnBlood(x,y,n,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=20+Math.random()*120;
    bloodFx.push({x,y,vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-30, t:0,
      life:0.5+Math.random()*0.5, col, r:1+Math.random()*2});
  }
}

function enemyY(e){
  let y=e.baseY;
  if (e.state==="windup") y += e.lean*10;
  if (e.state==="strike") y += e.lean*120;
  return y;
}

// ---------- update ----------
function update(dt){
  perfNow += dt;
  shake = Math.max(0, shake - dt*22);
  hitFlash = Math.max(0, hitFlash - dt*3);
  redFlash = Math.max(0, redFlash - dt*2);
  player.flashHurt = Math.max(0, player.flashHurt - dt*4);
  player.parryGlow = Math.max(0, player.parryGlow - dt*2);
  if (comboTimer>0){ comboTimer-=dt; if(comboTimer<=0) combo=0; }

  // slash & blood fx
  for (const s of slashFx) s.t+=dt;
  slashFx = slashFx.filter(s=>s.t<s.dur);
  for (const b of bloodFx){ b.t+=dt; b.vy+=260*dt; b.x+=b.vx*dt; b.y+=b.vy*dt; }
  bloodFx = bloodFx.filter(b=>b.t<b.life);

  if (gstate!==STATE.PLAY){ return; }

  player.stamina = Math.min(player.maxStam, player.stamina + dt*38);

  // player state machine
  if (player.state==="dodge"){
    player.t+=dt;
    const k = player.t/player.dur;
    const off = Math.sin(Math.min(k,1)*Math.PI) * 44;
    player.x = clamp(W/2 + player.dodgeDir*off - (player.dodgeDir===0?0:0), 60, W-60);
    if (player.dodgeDir===0) player.baseYoff = -Math.sin(Math.min(k,1)*Math.PI)*0;
    player.lean = player.dodgeDir*0.4;
    if (player.t>=player.dur){ player.state="idle"; player.x=lerp(player.x,W/2,0.5); }
  } else if (player.state==="attack"){
    player.t+=dt;
    const k=player.t/player.dur;
    player.lean = Math.sin(Math.min(k,1)*Math.PI)*0.5;
    if (!player._hitDone && k>0.4){ player._hitDone=true; resolveHit(player.target); }
    if (player.t>=player.dur){ player.state="idle"; player.lean=0; player.target=null; }
  } else if (player.state==="hurt"){
    player.t+=dt; if(player.t>=player.dur){ player.state="idle"; }
  } else {
    player.lean = lerp(player.lean,0,0.2);
    player.x = lerp(player.x, W/2, 0.12);
  }
  const dodgeIframe = player.state==="dodge" && player.t < 0.30;

  // enemies
  let allDead = true;
  for (const e of enemies){
    if (!e.alive){
      e.deadT += dt;
      continue;
    }
    allDead=false;
    e.flash = Math.max(0, e.flash - dt*4);
    e.t += dt;

    if (e.stagger>0 && e.state!=="dead"){
      e.stagger-=dt;
      if (e.state!=="stagger"){ e.state="stagger"; e.t=0; }
      e.lean = lerp(e.lean, -0.3, 0.2);
      if (e.stagger<=0){ e.state="idle"; e.t=0; e.lean=0; }
      e.baseY = lerp(e.baseY, e.engageY, 0.1);
      continue;
    }

    switch(e.state){
      case "approach":
        e.baseY += e.speed*dt;
        e.lean = Math.sin(perfNow*6+e.idx)*0.06;
        if (e.baseY>=e.engageY){ e.baseY=e.engageY; e.state="idle"; e.t=0; e.dur=0.5+Math.random()*0.8; }
        break;
      case "idle":
        e.baseY = lerp(e.baseY, e.engageY, 0.1);
        e.lean = Math.sin(perfNow*3+e.idx)*0.05;
        if (e.t>=e.dur){
          if (activeAttackers() < maxAttackers()){
            e.state="windup"; e.t=0; e.dur=Math.max(0.55, 0.95 - wave*0.04);
          } else { e.t=0; e.dur=0.4+Math.random()*0.5; }
        }
        break;
      case "windup":
        redFlash = Math.max(redFlash, 0.25);
        e.lean = lerp(e.lean, -0.5, 0.15) + Math.sin(perfNow*30)*0.03;
        if (e.t>=e.dur){ e.state="strike"; e.t=0; e.dur=0.18; e._struck=false; }
        break;
      case "strike":
        e.lean = lerp(e.lean, 1.6, 0.5);
        if (!e._struck && e.t>0.06){
          e._struck=true;
          // does it connect?
          const guarded = dodgeIframe || player.parryGlow>0.3;
          if (!guarded){
            player.hp -= 1; player.state="hurt"; player.t=0; player.dur=0.4;
            player.flashHurt=1; hitFlash=Math.max(hitFlash,.6); shake=Math.max(shake,10);
            spawnBlood(player.x, player.baseY-30, 8, "#7a0d0d");
            if (player.hp<=0){ player.dead=true; gstate=STATE.DEAD; }
          } else {
            // clean dodge -> enemy over-extends, becomes open
            shake=Math.max(shake,4);
          }
        }
        if (e.t>=e.dur){ e.state="recover"; e.t=0; e.dur=0.6; }
        break;
      case "recover":
        e.lean = lerp(e.lean, 0, 0.12);
        e.baseY = lerp(e.baseY, e.engageY, 0.1);
        if (e.t>=e.dur){ e.state="idle"; e.t=0; e.dur=0.5+Math.random()*0.7; }
        break;
    }
  }

  // wave cleared?
  if (allDead && enemies.length){
    waveTimer += dt;
    if (waveTimer>1.0){ waveTimer=0; nextWave(); }
  }
}

// ---------- drawing ----------
function drawFigure(x, baseY, scale, lean, facing, opt){
  // facing: -1 player (sword up), +1 enemy (sword down toward player)
  opt = opt||{};
  const body = opt.body || "#000000";
  const rim  = opt.rim  || "#8f8978";
  ctx.save();
  ctx.translate(x, baseY);
  ctx.rotate(lean*0.22*facing*-1);
  ctx.scale(scale, scale*facing===0?1:facing<0?1:1);
  // we keep upright; facing affects sword side only

  const f = facing; // for sword direction

  // shadow on ground
  ctx.save();
  ctx.scale(1,0.32);
  ctx.beginPath(); ctx.fillStyle="rgba(0,0,0,0.55)";
  ctx.ellipse(0, 18/0.32*0+ 6/0.32, 26, 22, 0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // cloak / body (tapered)
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(-16, 8);
  ctx.lineTo(-9, -44);
  ctx.lineTo(9, -44);
  ctx.lineTo(16, 8);
  ctx.quadraticCurveTo(0, 18, -16, 8);
  ctx.closePath(); ctx.fill();

  // shoulders
  ctx.beginPath();
  ctx.moveTo(-14,-40); ctx.lineTo(14,-40);
  ctx.lineTo(10,-52); ctx.lineTo(-10,-52); ctx.closePath(); ctx.fill();

  // head / hood
  ctx.beginPath();
  ctx.moveTo(-9,-50);
  ctx.quadraticCurveTo(0,-74, 9,-50);
  ctx.quadraticCurveTo(0,-58, -9,-50);
  ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.arc(0,-58,8,0,Math.PI*2); ctx.fill();

  // rim light (one side)
  ctx.strokeStyle = rim; ctx.lineWidth=1.4;
  ctx.beginPath();
  ctx.moveTo(9,-44); ctx.lineTo(16,8);
  ctx.moveTo(9,-52); ctx.lineTo(9,-44);
  ctx.moveTo(6,-66); ctx.quadraticCurveTo(11,-60,9,-50);
  ctx.stroke();
  // eye glint for enemy
  if (opt.eye){
    ctx.fillStyle = opt.eye;
    ctx.fillRect(-3,-60,2,2); ctx.fillRect(2,-60,2,2);
  }

  // sword: a long thin blade. player points up; enemy points down toward player.
  ctx.save();
  const swDir = f<0 ? -1 : 1;
  ctx.translate(13*1, -30);
  ctx.rotate((f<0? -0.35 : 2.5) );
  ctx.fillStyle = opt.blade || "#0a0a0a";
  ctx.fillRect(-1.5, 0, 3, 54);
  // edge highlight
  ctx.fillStyle = opt.bladeEdge || "#3a3630";
  ctx.fillRect(0.6, 0, 1, 54);
  // guard
  ctx.fillStyle = body;
  ctx.fillRect(-5,-2,10,3);
  ctx.restore();

  ctx.restore();
}

function drawBackground(){
  // pale ashen fog — stark black figures read against it (the Bleak Sword look)
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,   "#41423f");
  g.addColorStop(0.35,"#54534b");
  g.addColorStop(0.62,"#615e52");
  g.addColorStop(0.78,"#4a463c");
  g.addColorStop(1,   "#23211b");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // sickly horizon haze where the enemies emerge
  const hg = ctx.createRadialGradient(W/2, 300, 20, W/2, 300, 300);
  hg.addColorStop(0,"rgba(170,150,110,0.22)");
  hg.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=hg; ctx.fillRect(0,0,W,H);
  // ground plane (darker earth)
  const gp = ctx.createLinearGradient(0,H-185,0,H);
  gp.addColorStop(0,"#2c281f");
  gp.addColorStop(1,"#15130d");
  ctx.fillStyle=gp;
  ctx.beginPath();
  ctx.moveTo(0,H); ctx.lineTo(0, H-150);
  ctx.quadraticCurveTo(W/2, H-185, W, H-150);
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  ctx.strokeStyle="rgba(150,135,100,0.30)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H-150); ctx.quadraticCurveTo(W/2,H-185,W,H-150); ctx.stroke();
}

function drawGrainAndVignette(){
  ctx.save();
  ctx.globalAlpha = 0.10;
  ctx.globalCompositeOperation = "overlay";
  ctx.drawImage(noiseCv, (rnd()*4|0), (rnd()*4|0), NW, NH, 0,0,W,H);
  ctx.restore();
  // vignette (lighter — keep figures readable)
  const v = ctx.createRadialGradient(W/2,H*0.46, 150, W/2,H*0.5, 420);
  v.addColorStop(0,"rgba(0,0,0,0)");
  v.addColorStop(1,"rgba(0,0,0,0.62)");
  ctx.fillStyle=v; ctx.fillRect(0,0,W,H);
}

function drawHUD(){
  // hearts
  for (let i=0;i<player.maxHp;i++){
    const x=14+i*20, y=20;
    ctx.fillStyle = i<player.hp ? "#b41b1b" : "#241a1a";
    ctx.beginPath();
    ctx.moveTo(x,y+4);
    ctx.bezierCurveTo(x,y, x-7,y-1, x-7,y+5);
    ctx.bezierCurveTo(x-7,y+10, x,y+12, x,y+15);
    ctx.bezierCurveTo(x,y+12, x+7,y+10, x+7,y+5);
    ctx.bezierCurveTo(x+7,y-1, x,y, x,y+4);
    ctx.fill();
  }
  // stamina bar
  ctx.fillStyle="#1a1813"; ctx.fillRect(14, 40, 120, 6);
  ctx.fillStyle= player.stamina<22?"#6b5b1f":"#9c8a3f";
  ctx.fillRect(14, 40, 120*(player.stamina/player.maxStam), 6);
  ctx.strokeStyle="#3a352b"; ctx.lineWidth=1; ctx.strokeRect(14.5,40.5,120,6);

  // wave
  ctx.fillStyle="#8a7f68"; ctx.font="12px 'Courier New',monospace";
  ctx.textAlign="right";
  ctx.fillText("WAVE "+wave+"/"+MAX_WAVE, W-12, 26);
  ctx.fillText("SOULS "+kills, W-12, 42);
  if (combo>1){
    ctx.textAlign="center"; ctx.fillStyle="rgba(210,200,170,"+clamp(comboTimer,0,1)+")";
    ctx.font="bold 14px 'Courier New',monospace";
    ctx.fillText(combo+" HITS", W/2, 70);
  }
  ctx.textAlign="left";
}

function drawSlashFx(){
  for (const s of slashFx){
    const k=s.t/s.dur;
    ctx.save();
    ctx.translate(s.x,s.y);
    ctx.rotate(s.ang);
    ctx.globalAlpha=(1-k)*0.9;
    ctx.strokeStyle="#f2ecda"; ctx.lineWidth=(1-k)*5*s.power+1;
    ctx.beginPath();
    ctx.arc(0,0, 30*s.power, -0.9 - k*0.8, 0.9 - k*0.8);
    ctx.stroke();
    ctx.restore();
  }
}
function drawBlood(){
  for (const b of bloodFx){
    ctx.globalAlpha = clamp(1 - b.t/b.life,0,1);
    ctx.fillStyle=b.col;
    ctx.fillRect(b.x, b.y, b.r, b.r);
  }
  ctx.globalAlpha=1;
}

function drawScene(){
  drawBackground();

  // enemies (far first)
  const order = [...enemies].sort((a,b)=>enemyY(a)-enemyY(b));
  for (const e of order){
    const ey = enemyY(e);
    if (!e.alive){
      // fade & sink
      ctx.save();
      ctx.globalAlpha = clamp(1 - e.deadT*1.4, 0, 1);
      drawFigure(e.x, ey+ e.deadT*30, 0.92, 1.6, +1, {
        body:"#040404", rim:"#1a1714", blade:"#0a0a0a"});
      ctx.restore();
      continue;
    }
    // telegraph red flash on windup
    if (e.state==="windup"){
      const pulse = 0.4+0.6*Math.abs(Math.sin(perfNow*16));
      ctx.save();
      ctx.globalAlpha = pulse*0.9;
      ctx.fillStyle="#c11a1a";
      ctx.beginPath(); ctx.arc(e.x, ey-30, 40, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // warning mark
      ctx.fillStyle="#ffdede"; ctx.font="bold 22px 'Courier New',monospace";
      ctx.textAlign="center"; ctx.fillText("!", e.x, ey-66);
      ctx.textAlign="left";
    }
    const body = e.flash>0 ? "#f2ede0" : (e.state==="windup"?"#2a0606":"#000000");
    const rim  = e.state==="recover"||e.state==="stagger" ? "#c0a85a" : "#7d7666";
    drawFigure(e.x, ey, 0.92, e.lean, +1, {
      body, rim, eye:"#b41b1b", blade:e.flash>0?"#fff":"#0a0a0a",
      bladeEdge:"#4a4438"});
    // hp pips
    for (let i=0;i<e.maxHp;i++){
      ctx.fillStyle = i<e.hp ? "#9c2b2b" : "#241a1a";
      ctx.fillRect(e.x-e.maxHp*3 + i*6, ey-92, 4, 3);
    }
  }

  // player
  if (!player.dead){
    const pg = player.parryGlow;
    if (pg>0){
      ctx.save(); ctx.globalAlpha=pg*0.7; ctx.fillStyle="#d9d2bd";
      ctx.beginPath(); ctx.arc(player.x, player.baseY-26, 40,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    const body = player.flashHurt>0 ? "#8a1414" : "#000000";
    drawFigure(player.x, player.baseY, 1.05, player.lean, -1, {
      body, rim:"#a39c88", blade:"#000", bladeEdge:"#7a7461"});
  }

  drawSlashFx();
  drawBlood();
  drawHUD();
}

// ---------- screens ----------
function softTitle(txt, x, y, size, col){
  ctx.font="bold "+size+"px 'Courier New',monospace";
  ctx.textAlign="center";
  ctx.save();
  ctx.shadowColor="rgba(180,140,80,0.5)"; ctx.shadowBlur=18;
  ctx.fillStyle=col; ctx.fillText(txt,x,y);
  ctx.restore();
  ctx.textAlign="left";
}

function drawTitle(){
  drawBackground();
  // lone silhouette
  drawFigure(W/2, H-150, 1.4, Math.sin(perfNow*1.5)*0.05, -1,
    {body:"#040404", rim:"#2a261f", blade:"#111", bladeEdge:"#4a4438"});
  softTitle("BLEAK", W/2, 180, 54, "#d8cdb0");
  softTitle("SWORD", W/2, 232, 54, "#b41b1b");
  ctx.font="12px 'Courier New',monospace"; ctx.textAlign="center";
  ctx.fillStyle="#7a715c";
  ctx.fillText("— a grim little homage —", W/2, 262);
  const blink = (Math.sin(perfNow*3)+1)/2;
  ctx.globalAlpha=0.4+0.6*blink;
  ctx.fillStyle="#cabfa8"; ctx.font="14px 'Courier New',monospace";
  ctx.fillText("TAP / CLICK TO BEGIN", W/2, 330);
  ctx.globalAlpha=1;
  // controls
  ctx.fillStyle="#6a6253"; ctx.font="11px 'Courier New',monospace";
  ctx.fillText("DRAG or ARROWS — dodge", W/2, H-70);
  ctx.fillText("CLICK enemy / J — slash", W/2, H-54);
  ctx.fillText("CLICK on the RED FLASH — parry", W/2, H-38);
  ctx.textAlign="left";
}

function drawDead(){
  drawScene();
  ctx.fillStyle="rgba(10,2,2,0.72)"; ctx.fillRect(0,0,W,H);
  softTitle("YOU DIED", W/2, H/2-6, 40, "#9c1414");
  ctx.font="13px 'Courier New',monospace"; ctx.textAlign="center";
  ctx.fillStyle="#8a7f68";
  ctx.fillText("reached wave "+wave+" · "+kills+" souls", W/2, H/2+24);
  const blink=(Math.sin(perfNow*3)+1)/2;
  ctx.globalAlpha=0.4+0.6*blink;
  ctx.fillStyle="#cabfa8"; ctx.fillText("CLICK TO RISE AGAIN", W/2, H/2+58);
  ctx.globalAlpha=1; ctx.textAlign="left";
}

function drawWin(){
  drawScene();
  ctx.fillStyle="rgba(8,8,4,0.78)"; ctx.fillRect(0,0,W,H);
  softTitle("THE BLADE RESTS", W/2, H/2-6, 26, "#d8cdb0");
  ctx.font="13px 'Courier New',monospace"; ctx.textAlign="center";
  ctx.fillStyle="#8a7f68";
  ctx.fillText("all "+MAX_WAVE+" waves survived · "+kills+" souls", W/2, H/2+24);
  const blink=(Math.sin(perfNow*3)+1)/2; ctx.globalAlpha=0.4+0.6*blink;
  ctx.fillStyle="#cabfa8"; ctx.fillText("CLICK TO BEGIN ANEW", W/2, H/2+58);
  ctx.globalAlpha=1; ctx.textAlign="left";
}

// ---------- input ----------
let pdown=null;
function canvasPos(ev){
  const r=cv.getBoundingClientRect();
  const cx=(ev.touches?ev.touches[0].clientX:ev.clientX)-r.left;
  const cy=(ev.touches?ev.touches[0].clientY:ev.clientY)-r.top;
  return { x: cx*(W/r.width), y: cy*(H/r.height) };
}
function onDown(ev){
  ev.preventDefault();
  const p=canvasPos(ev);
  pdown={...p, t:perfNow, moved:false};
  if (gstate===STATE.TITLE){ startGame(); pdown=null; return; }
  if (gstate===STATE.DEAD){ startGame(); pdown=null; return; }
  if (gstate===STATE.WIN){ startGame(); pdown=null; return; }
}
function onMove(ev){
  if (!pdown || gstate!==STATE.PLAY) return;
  ev.preventDefault();
  const p=canvasPos(ev);
  const dx=p.x-pdown.x, dy=p.y-pdown.y;
  if (Math.hypot(dx,dy)>28 && !pdown.moved){
    pdown.moved=true;
    // swipe = dodge in horizontal direction (or back if mostly down)
    if (Math.abs(dx) > Math.abs(dy)*0.8) tryDodge(dx<0?-1:1);
    else if (dy>0) tryDodge(0);
    else tryDodge(dx<0?-1:1);
  }
}
function onUp(ev){
  if (!pdown){ return; }
  ev.preventDefault();
  if (gstate===STATE.PLAY && !pdown.moved){
    const e=enemyAt(pdown.x,pdown.y);
    if (e) tryAttack(e);
    else {
      // tap on empty: dodge toward tapped side, or attack nearest if center-bottom
      if (pdown.y > H-180) tryAttack(null);
      else tryDodge(pdown.x < player.x ? -1 : 1);
    }
  }
  pdown=null;
}
cv.addEventListener("mousedown", onDown);
window.addEventListener("mousemove", onMove);
window.addEventListener("mouseup", onUp);
cv.addEventListener("touchstart", onDown, {passive:false});
cv.addEventListener("touchmove", onMove, {passive:false});
cv.addEventListener("touchend", onUp, {passive:false});

window.addEventListener("keydown", e=>{
  if (e.repeat) return;
  if (gstate!==STATE.PLAY){
    if (e.key===" "||e.key==="Enter"){ startGame(); }
    return;
  }
  switch(e.key){
    case "ArrowLeft": case "a": case "A": tryDodge(-1); break;
    case "ArrowRight": case "d": case "D": tryDodge(1); break;
    case "ArrowDown": case "s": case "S": case " ": e.preventDefault(); tryDodge(0); break;
    case "j": case "J": case "ArrowUp": case "w": case "W":
      tryAttack(null); break;
  }
});

// ---------- main loop ----------
let last=performance.now();
function frame(t){
  let dt=(t-last)/1000; last=t;
  if (dt>0.05) dt=0.05;
  perfNowAbs=t;
  regenNoise();
  update(dt);

  // screen shake transform
  ctx.save();
  if (shake>0){
    ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
  }
  if (gstate===STATE.TITLE) drawTitle();
  else if (gstate===STATE.PLAY) drawScene();
  else if (gstate===STATE.DEAD) drawDead();
  else if (gstate===STATE.WIN) drawWin();
  ctx.restore();

  // flashes (over everything, no shake)
  if (hitFlash>0){ ctx.fillStyle="rgba(255,255,255,"+(hitFlash*0.5)+")"; ctx.fillRect(0,0,W,H); }
  if (redFlash>0 && gstate===STATE.PLAY){
    ctx.fillStyle="rgba(150,10,10,"+(redFlash*0.18)+")"; ctx.fillRect(0,0,W,H);
  }
  drawGrainAndVignette();

  requestAnimationFrame(frame);
}
let perfNowAbs=0;
requestAnimationFrame(frame);

})();
</script>
